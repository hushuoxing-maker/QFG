<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>古月AI智能体 · 商业门头（强随机终极版）</title>

<style>
body{
  background:#1a1a2e;
  font-family:"Microsoft YaHei";
  padding:30px;
}
.box{
  max-width:1200px;
  margin:auto;
  background:#fff;
  border-radius:20px;
  padding:30px;
}
input,select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
button{
  width:100%;
  padding:14px;
  background:#2a5a7a;
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.item{
  background:#f5f7fc;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
  position:relative;
}
.copy{
  position:absolute;
  right:10px;
  bottom:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>古月AI智能体 · 商业门头（强随机终极版</h2>

<input id="industry" placeholder="行业">
<input id="brand" placeholder="品牌">
<input id="category" placeholder="品类">
<input id="slogan" placeholder="标语">

<select id="style">
<option>现代简约</option>
<option>轻奢风</option>
<option>国潮风</option>
<option>科技风</option>
</select>

<button onclick="run()">生成20组</button>

<div id="list"></div>

</div>

<script>

// ===== 随机 =====
function rand(arr){
  return arr[Math.floor(Math.random()*arr.length)]
}

// ===== 防重复 =====
let last = {}
function randNoRepeat(key, arr){
  let val
  do{
    val = rand(arr)
  }while(val === last[key])
  last[key] = val
  return val
}

// ===== 打乱 =====
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5)
}

// ===== 风格库 =====
const styleMap = {
"现代简约":{
materials:["白色铝板","灰色铝塑板","哑光板","极简金属"],
decors:["线性灯","无边框","隐藏灯带","极简线条"],
lights:["柔光","自然光","均匀光","干净光"],
colors:["白","灰","米白","极简灰"]
},
"轻奢风":{
materials:["大理石","玫瑰金不锈钢","香槟金","镜面金属"],
decors:["金属线条","包边","嵌条","金属装饰"],
lights:["氛围灯","背光","柔光","高级光"],
colors:["金","白","灰","黑"]
},
"国潮风":{
materials:["红色板","中国红","金色板","木板"],
decors:["祥云","霓虹","金边","传统纹样"],
lights:["霓虹","强光","彩光","RGB"],
colors:["红","金","黄","蓝"]
},
"科技风":{
materials:["金属板","黑钛","玻璃","铝板"],
decors:["线性灯","切割","几何","金属格栅"],
lights:["蓝光","冷光","RGB","科技光"],
colors:["黑","蓝","灰","银"]
}
}

// ===== 模板 =====
const templates = [

(c)=>`白天自然光，${c.industry}门头正立面，${c.material}主体，${c.decor}设计，${c.color}色调，${c.light}光效，品牌“${c.brand}”，${c.category}，${c.slogan}，8K写实`,

(c)=>`${c.style}风格${c.industry}门头，采用${c.material}，结合${c.decor}，整体${c.color}体系，搭配${c.light}照明，品牌“${c.brand}”突出，商业效果图`,

(c)=>`围绕${c.brand}打造${c.industry}门头，${c.style}风格，${c.material}基底，${c.decor}强化，${c.color}氛围，${c.light}灯光，真实落地`,

// 🔥 完全打乱结构
(c)=>{
  let arr = shuffle([
    `${c.industry}门头`,
    `${c.style}风格`,
    `${c.material}`,
    `${c.decor}`,
    `${c.color}`,
    `${c.light}`,
    `品牌${c.brand}`,
    `${c.category}`,
    `${c.slogan}`,
    `8K写实`
  ])
  return arr.join("，")
}

]

// ===== 单条 =====
function genOne(industry,brand,category,slogan,style){

  let conf = styleMap[style]

  let c = {
    industry,
    brand,
    category,
    slogan,
    style,
    material:randNoRepeat("m",conf.materials),
    decor:randNoRepeat("d",conf.decors),
    light:randNoRepeat("l",conf.lights),
    color:randNoRepeat("c",conf.colors)
  }

  return rand(templates)(c)
}

// ===== 生成20条（去重）=====
function genAll(industry,brand,category,slogan,style){

  let set = new Set()
  let safe = 200

  while(set.size < 20 && safe--){
    let txt = genOne(industry,brand,category,slogan,style)

    // 二次扰动（彻底去重复）
    txt += " ·"+Math.floor(Math.random()*9999)

    set.add(txt)
  }

  return Array.from(set)
}

// ===== 主函数 =====
function run(){

  let industry=document.getElementById("industry").value
  let brand=document.getElementById("brand").value
  let category=document.getElementById("category").value
  let slogan=document.getElementById("slogan").value
  let style=document.getElementById("style").value

  let list = genAll(industry,brand,category,slogan,style)

  let html=""

  list.forEach((t,i)=>{
    html+=`
    <div class="item">
    ${i+1}. ${t}
    <button class="copy" onclick="copy('${t.replace(/'/g,"")}')">复制</button>
    </div>`
  })

  document.getElementById("list").innerHTML=html
}

// ===== 复制 =====
function copy(t){
  navigator.clipboard.writeText(t)
}

</script>

</body>
</html>
