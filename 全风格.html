        }

        .header p {

            color: #c0e0ff;
            font-weight: 300;
        }

        .main {
            display: flex;
            flex-wrap: wrap;
            padding: 30px;
            gap: 30px;
        }

        .input-section {
            flex: 1.2;
            min-width: 380px;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .input-section h2 {
            font-size: 26px;
            font-weight: 500;
            color: #1e3c5a;
            margin-bottom: 25px;
            border-bottom: 2px solid #ffb85b;
            padding-bottom: 15px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: #2a4a6a;
            margin-bottom: 8px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            background: #f8faff;
            border: 2px solid #c0d8f0;
            border-radius: 40px;
            transition: 0.2s;
            font-family: inherit;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #ffb85b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255,184,91,0.2);
        }

        .generate-btn {
            background: linear-gradient(135deg, #1e3c5a 0%, #2a5a7a 100%);
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 20px;
            font-weight: 600;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .output-section {
            flex: 2;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

            font-size: 24px;
            font-weight: 500;
            color: #1e3c5a;
        }

            background: #ffb85b;
            color: #1e3c5a;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 600;
        }

        .prompts-grid {
            max-height: 600px;
            overflow-y: auto;
            padding-right: 10px;
        }

            background: #f8faff;
            border: 1px solid #e0e8f0;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;

            font-weight: 600;
            color: #ffb85b;
            margin-bottom: 8px;
        }

            color: #2a3a5a;
            margin-bottom: 15px;
            padding-right: 80px;

                },
                '异形创意': {
                    materials: ['玻璃钢', '异形烤漆', '软膜灯箱', 'IP造型', '彩色亚克力', '树脂', '硅胶', '复合材质'],
                    decors: ['IP雕塑', '铁艺造型', '发光字', '不规则造型', '网红元素', '抽象形态', '艺术造型', '互动装置'],
                    lights: ['造型灯', '氛围灯', '彩色霓虹', '软膜光', '轮廓灯', '内发光', '外发光', '渐变光'],
                    colors: ['粉', '蓝', '黄', '绿', '彩', '渐变色', '糖果色', '荧光色']
                }
            };

            function generatePrompts(industry, brand, category, slogan, style) {
                const config = styleConfig[style] || styleConfig['现代简约'];
                const prompts = [];
                
                for (let i = 0; i < 20; i++) {
                    const material = config.materials[i % config.materials.length];
                    const decor = config.decors[i % config.decors.length];
                    const light = config.lights[i % config.lights.length];
                    const color = config.colors[i % config.colors.length];
                    
                    const prompt = `白天自然光下，某${industry}门头正立面完整展示，正面平视视角，无透视畸变无遮挡。门头为${style}风格，采用${material}为基底，${decor}装饰，整体${color}色调，${light}照明。品牌店名“${brand}”搭配主营品类“${category}”及标语“${slogan}”，醒目清晰字体。8K高清商业写实效果图，细节丰富色彩自然，可直接施工参考。门头效果图正面完全展示。`;
                    
                    prompts.push(prompt);
                }
                
                return prompts;
            }

            function renderPrompts(prompts) {
                let html = '';
                prompts.forEach((prompt, idx) => {
                    const escapedPrompt = prompt.replace(/"/g, '&quot;');
                    html += `
                        <div class="prompt-item">
                            <div class="prompt-number">✨ 第 ${idx+1} 组 · 正立面门头</div>
                            <div class="prompt-text">${prompt}</div>
                            <button class="copy-btn" onclick="copyPrompt('${escapedPrompt}', this)">📋 复制</button>
                        </div>
                    `;
                });
                
                promptsListDiv.innerHTML = html;
                countDisplay.innerText = `${prompts.length} / 20`;
            }

            window.copyPrompt = function(prompt, btn) {
                navigator.clipboard.writeText(prompt).then(() => {
                    btn.textContent = '✓ 已复制';
                    setTimeout(() => {
                        btn.textContent = '📋 复制';
                    }, 2000);
                }).catch(() => {
                    alert('复制失败');
                });
            };

            generateBtn.addEventListener('click', () => {
                const industry = industryInput.value.trim();
                const brand = brandInput.value.trim();
                const category = categoryInput.value.trim();
                const slogan = sloganInput.value.trim();
                const style = styleSelect.value;
                
                if (!industry || !brand || !category || !slogan) {
                    alert('请完整填写所有信息');
                    return;
                }
                
                const prompts = generatePrompts(industry, brand, category, slogan, style);
                renderPrompts(prompts);
            });

            // 默认生成一组示例
            window.addEventListener('load', () => {
                setTimeout(() => {
                    const prompts = generatePrompts('奶茶店', '茶颜光年', '鲜果奶茶', '此刻发光', '现代简约');
                    renderPrompts(prompts);
                }, 100);
            });
        })();
    </script>
</body>
</html>
