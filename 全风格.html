<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古月 · 商业门头设计AI智能体 · 全风格生成器</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:#1a1a2e;
font-family:'Microsoft YaHei','PingFang SC','Helvetica Neue',sans-serif;
display:flex;justify-content:center;align-items:center;
min-height:100vh;padding:20px;
}
.generator-card{
max-width:1400px;width:100%;
background:#f5f7fc;border-radius:40px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
overflow:hidden;
}
.header{
background:linear-gradient(135deg,#1e3c5a 0%,#2a5a7a 100%);
padding:30px 40px;color:white;
}
.header h1{font-size:36px;margin-bottom:8px;}
.header p{font-size:18px;color:#c0e0ff;}
.main{display:flex;flex-wrap:wrap;padding:30px;gap:30px;}
.input-section,.output-section{
background:white;padding:30px;border-radius:30px;
box-shadow:0 10px 20px rgba(0,0,0,0.05);
}
.input-section{flex:1.2;min-width:380px;}
.output-section{flex:2;}

.input-group{margin-bottom:20px;}
.input-group label{display:block;margin-bottom:8px;font-weight:600;}
.input-group input,.input-group select{
width:100%;padding:14px;border-radius:40px;
border:2px solid #c0d8f0;background:#f8faff;
}
.generate-btn{
width:100%;padding:16px;font-size:20px;
border:none;border-radius:60px;
background:linear-gradient(135deg,#1e3c5a,#2a5a7a);
color:white;cursor:pointer;
}

.prompts-grid{max-height:600px;overflow-y:auto;}
.prompt-item{
background:#f8faff;border:1px solid #e0e8f0;
border-radius:24px;padding:20px;margin-bottom:15px;
position:relative;
}
.copy-btn{
position:absolute;right:20px;bottom:20px;
border:none;padding:8px 20px;border-radius:30px;
cursor:pointer;background:#e0ecf5;
}
</style>
</head>

<body>

<div class="generator-card">

<div class="header">
<h1>🎨 古月 · 商业门头设计AI智能体</h1>
<p>全风格门头提示词生成器 · 20组不重复 · 8K写实</p>
</div>

<div class="main">

<div class="input-section">
<div class="input-group">
<label>行业</label>
<input id="industry" value="奶茶店">
</div>

<div class="input-group">
<label>品牌</label>
<input id="brand" value="茶颜光年">
</div>

<div class="input-group">
<label>品类</label>
<input id="category" value="鲜果奶茶">
</div>

<div class="input-group">
<label>标语</label>
<input id="slogan" value="此刻发光">
</div>

<div class="input-group">
<label>风格</label>
<select id="styleSelect">
<option value="现代简约">现代简约</option>
<option value="轻奢风">轻奢风</option>
<option value="国潮风">国潮风</option>
</select>
</div>

<button class="generate-btn" id="generateBtn">生成20组</button>
</div>

<div class="output-section">
<div id="promptsList" class="prompts-grid"></div>
</div>

</div>
</div>

<script>

(function(){

const styleConfig = {
'现代简约':{
materials:['白色烤漆板','浅灰铝板','象牙白','高级灰'],
decors:['金属包边','线性灯带','无边框','嵌入灯'],
lights:['背光字','柔光','均匀光','线性光'],
colors:['白','灰','米白','银灰']
},
'轻奢风':{
materials:['大理石','黑钛金','香槟金'],
decors:['金属线条','镜面','嵌条'],
lights:['氛围灯','背光','射灯'],
colors:['白','金','灰']
},
'国潮风':{
materials:['红色烤漆','金色板','蓝色板'],
decors:['祥云','霓虹','金属'],
lights:['霓虹','强光','彩光'],
colors:['红','金','蓝']
}
};

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generatePrompts(industry, brand, category, slogan, style){

const config = styleConfig[style];
const prompts = [];
const used = new Set();

while(prompts.length < 20){

const material = random(config.materials);
const decor = random(config.decors);
const light = random(config.lights);
const color = random(config.colors);

const structure = random(['单层结构','双层结构','立体结构','外扩结构','内凹结构']);
const layout = random(['居中','左右分布','上下结构','极简排版']);
const detail = random(['高级感强','视觉冲击','商业感强','层次丰富']);

const prompt = `白天，${industry}门头正立面，${style}风格，${material}+${decor}，${structure}，${color}色调，${light}照明，排版${layout}，品牌“${brand}”，品类“${category}”，标语“${slogan}”，${detail}，8K写实，可施工`;

if(!used.has(prompt)){
used.add(prompt);
prompts.push(prompt);
}
}

return prompts;
}

function render(prompts){

let html = '';

prompts.forEach((p,i)=>{
const safe = p.replace(/"/g,'&quot;');
html += `
<div class="prompt-item">
<div>${i+1}. ${p}</div>
<button class="copy-btn" onclick="copyPrompt('${safe}',this)">复制</button>
</div>`;
});

document.getElementById('promptsList').innerHTML = html;
}

window.copyPrompt = function(text,btn){
navigator.clipboard.writeText(text);
btn.innerText='已复制';
setTimeout(()=>btn.innerText='复制',1500);
};

document.getElementById('generateBtn').onclick = ()=>{

const industry = document.getElementById('industry').value;
const brand = document.getElementById('brand').value;
const category = document.getElementById('category').value;
const slogan = document.getElementById('slogan').value;
const style = document.getElementById('styleSelect').value;

const prompts = generatePrompts(industry,brand,category,slogan,style);
render(prompts);
};

})();

</script>

</body>
</html>
